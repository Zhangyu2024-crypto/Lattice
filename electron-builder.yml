appId: com.lattice.app
productName: Lattice
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
# `worker/` ships unpacked outside the asar archive — it contains:
#   * `main.py` + `tools/*.py` — Python worker entry (spawned via
#     child_process; needs a real filesystem path, not an asar shim).
#   * `data/mp_xrd_database.db` — 784 MB Materials Project SQLite with
#     154,879 phases. SQLite WAL mode requires read/write filesystem
#     access so the DB must live outside the asar archive.
#   * `data/raman_references.json`, `data/xps_lines.json`,
#     `data/xrd_references.json` — bundled reference JSONs.
extraResources:
  - from: worker
    to: worker
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
  # Embedded conda environment (Python + numpy/scipy/pymatgen/LAMMPS).
  # Built by scripts/pack-conda-env.sh per platform. ~800MB unpacked.
  # If resources/conda-env/ doesn't exist, the app falls back to system
  # Python — so dev builds without it still work.
  - from: resources/conda-env
    to: conda-env
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
forceCodeSigning: false
win:
  target:
    - target: dir
      arch:
        - x64
  sign: false
  signAndEditExecutable: false
